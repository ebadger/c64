name: "💬 Report a c64 problem (non-technical)"
description: "Report an edit, build, run, share, import, or download problem without technical detail."
title: "[PROBLEM] <short summary>"
labels: ["status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        No technical detail needed — just tell us what happened and what you expected.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe it in plain language.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: where
    attributes:
      label: Where did you see this?
      placeholder: "page / action / browser / device"
