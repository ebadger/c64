name: "🐛 c64 bug report"
description: "Report an assembler, artifact, emulator, media, or browser defect."
title: "[BUG] <area>: <short summary>"
labels: ["type: bug", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Keep evidence concrete. Artifact corruption, nondeterministic rebuilds, incorrect
        machine behavior, ROM-license/privacy violations, or a core edit/build/run/download
        flow being unavailable are critical-path defects.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity (proposed — triage confirms)
      options:
        - "critical — corrupt/nondeterministic artifact, legal/privacy boundary, or core flow down"
        - "high — incorrect emulation/build behavior for common software, no clean workaround"
        - "medium — feature broken but a practical workaround exists"
        - "low — cosmetic, minor, or documentation-only"
    validations:
      required: true

  - type: checkboxes
    id: layers
    attributes:
      label: Affected layer(s)
      description: "Select every layer the bytes or machine state cross."
      options:
        - label: "Assembler / source project"
        - label: "PRG / D64 media"
        - label: "CPU / bus / banking"
        - label: "VIC-II"
        - label: "SID / CIA / keyboard / joystick"
        - label: "ROM assets"
        - label: "WASM bridge / web client"
        - label: "Build / tests / Pages deployment"
        - label: "Unknown — needs investigation"

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include source/media, timing profile, ROM-set identity, and exact actions when relevant.
      placeholder: |
        1. Open/build ...
        2. Select PAL/NTSC and ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected versus actual
      placeholder: |
        Expected: ...
        Actual:   ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Commit/build ID, browser/OS, timing profile, and ROM digest/role metadata only. Do not attach ROM bytes.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence (optional)
      description: Diagnostics, hashes, screenshots, minimal source, failing test, or external-tool result. Never attach copyrighted ROMs.
