name: core

# Fast per-branch feedback lane: builds the deterministic machine core (native CMake/CTest and the
# production WebAssembly artifact), plus the milestone-1 Node pipeline, web-client and gallery
# golden vectors, headless native/WASM parity, a Chromium browser E2E against the production WASM
# artifact, and the operating-foundation checks. Fails closed.
#
# Pull requests and pushes to `main` are gated by the comprehensive `release.yml` (full browser
# matrix, external D64 interoperability, production dist build/integrity, and Pages deploy on main),
# so this workflow runs only on non-main branch pushes to keep feedback fast and avoid duplicating
# the full release gate.

on:
  push:
    branches-ignore: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Read pinned Emscripten version
        id: emsdk
        run: echo "version=$(grep -Eo '^[0-9.]+' scripts/build/emscripten-version.txt | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Read pinned Playwright version
        id: playwright
        run: echo "version=$(grep -Eo '^[0-9.]+' scripts/build/playwright-version.txt | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Set up Emscripten (pinned)
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk.outputs.version }}

      - name: Native build + CTest
        run: sh scripts/build/build-native.sh

      - name: WebAssembly build (production artifact)
        run: sh scripts/build/build-wasm.sh

      - name: Milestone-1 pipeline tests + headless native/WASM parity
        run: node scripts/dev/run-node-tests.mjs tests

      - name: Example golden vectors
        run: node examples/build-example.mjs

      - name: Gallery golden vectors
        run: node web/client/tools/build-gallery.mjs

      - name: Install pinned Playwright chromium (browser E2E)
        run: |
          npm i --no-save --no-package-lock "playwright@${{ steps.playwright.outputs.version }}"
          npx playwright --version
          npx playwright install --with-deps chromium

      - name: Browser E2E against the production WASM artifact
        run: node scripts/dev/run-node-tests.mjs tests/e2e

      - name: Operating-foundation checks
        run: |
          sh scripts/dev/check-learnings-budget.sh
          node scripts/dev/review-template-updates.mjs check
          node --check .github/extensions/compliance-hooks/extension.mjs
          node --test .github/extensions/compliance-hooks/policy.test.mjs
